entity:
  code: "equipment"
  name: "办公设备"
  nameEn: "Office Equipment"

fields:
  - key: "code"
    label: "设备编号"
    labelEn: "Equipment Code"
  - key: "name"
    label: "设备名称"
    labelEn: "Equipment Name"
  - key: "category"
    label: "设备类型"
    labelEn: "Equipment Type"
    options:
      - value: "computer"
        label: "电脑"
      - value: "printer"
        label: "打印机"
      - value: "projector"
        label: "投影仪"
      - value: "phone"
        label: "电话"
      - value: "other"
        label: "其他"
  - key: "brand"
    label: "品牌"
  - key: "model"
    label: "型号"
  - key: "serial_number"
    label: "序列号"
  - key: "quantity"
    label: "数量"
    default: 1
  - key: "unit"
    label: "单位"
    options:
      - value: "pcs"
        label: "台"
      - value: "set"
        label: "套"
  - key: "location"
    label: "位置"
  - key: "purchase_price"
    label: "采购价格"
  - key: "purchase_date"
    label: "采购日期"
  - key: "warranty_end_date"
    label: "保修截止日期"
  - key: "notes"
    label: "备注"
