<!doctype html>
<html lang="zh-CN" data-font-state="loading">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />

    <!-- Google Fonts 思源黑体 - 异步加载，避免阻塞首屏 -->
    <link rel="preconnect" href="https://fonts.googleapis.cn" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      /* 英文字体 */
      @font-face {
        font-family: 'Arial-Latin';
        src: local('Arial'), local('Helvetica Neue'), local('Helvetica');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Arial-Latin';
        src: local('Arial Bold'), local('Helvetica Neue Bold'), local('Helvetica');
        font-weight: bold;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <title>实验室库存管理系统</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/fontLoader.ts"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
